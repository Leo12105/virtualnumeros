<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NumVirtual - Números Virtuales Gratis</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-950 text-white min-h-screen">
  <div class="max-w-7xl mx-auto p-6">
    <header class="text-center mb-10">
      <h1 class="text-5xl font-bold text-blue-500">NumVirtual</h1>
      <p class="text-gray-400 mt-2">Números virtuales temporales de múltiples países</p>
    </header>

    <div id="filters" class="flex flex-wrap gap-3 justify-center mb-8"></div>

    <div class="bg-gray-900 rounded-2xl overflow-hidden shadow-2xl">
      <table class="w-full">
        <thead class="bg-gray-800">
          <tr>
            <th class="p-5 text-left">País</th>
            <th class="p-5 text-left">Número Virtual</th>
            <th class="p-5 text-center">Acciones</th>
            <th class="p-5 text-center">Actualizado</th>
          </tr>
        </thead>
        <tbody id="numbersBody" class="text-gray-300"></tbody>
      </table>
    </div>

    <p class="text-center text-xs text-gray-500 mt-8">
      ⚠️ Los números son públicos y pueden dejar de funcionar en cualquier momento.
    </p>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
